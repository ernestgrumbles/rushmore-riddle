<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 84">

  <!-- ── Everything bobs slightly as the climber shifts weight ── -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-2; 0,0; 0,1; 0,0"
      keyTimes="0;0.25;0.5;0.75;1"
      dur="0.8s" repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

    <!-- Hair -->
    <ellipse cx="27" cy="8"  rx="13" ry="10" fill="#7B4A28"/>
    <!-- Head -->
    <ellipse cx="27" cy="10" rx="11" ry="9.5" fill="#F5C49A"/>
    <!-- Ear -->
    <ellipse cx="16.5" cy="11" rx="2.5" ry="3" fill="#F0BA8A"/>
    <!-- Eyes -->
    <circle cx="23" cy="9"   r="2.2" fill="#222"/>
    <circle cx="31" cy="9"   r="2.2" fill="#222"/>
    <circle cx="23.9" cy="8.1" r="0.9" fill="white"/>
    <circle cx="31.9" cy="8.1" r="0.9" fill="white"/>
    <!-- Effort brows -->
    <path d="M20 6.5 Q23 5 26 6.5"   stroke="#5A3010" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M28 6.5 Q31 5 34 6.5"   stroke="#5A3010" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- Big grin -->
    <path d="M21 14 Q27 18.5 33 14"  stroke="#C06030" stroke-width="1.4" fill="#F8A8A8" stroke-linecap="round"/>
    <!-- Neck -->
    <rect x="23" y="18" width="8" height="5" rx="2" fill="#F5C49A"/>
    <!-- Backpack (on back-right, peeking out) -->
    <rect x="34" y="21" width="13" height="20" rx="3" fill="#CC3300"/>
    <rect x="35" y="23" width="11" height="16" rx="2" fill="#E84020"/>
    <line x1="34" y1="27" x2="34" y2="38" stroke="#AA2200" stroke-width="1.5"/>
    <!-- Torso -->
    <path d="M14 22 Q16 20 27 20 Q38 20 40 22 L37 43 Q31 46 27 46 Q23 46 17 43 Z" fill="#3D8B3D"/>
    <!-- Collar -->
    <path d="M27 20 L23 27 L27 24.5 L31 27 Z" fill="#2D6B2D"/>

    <!-- ── RIGHT LEG — pivot at right hip (33, 45) ──
         Starts planted (+15°), kicks up (−18°) at halfway, returns.
         Opposite phase to left leg. -->
    <g transform="translate(33,45)">
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="15 0 0;-18 0 0;15 0 0"
          keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <line x1="0" y1="0" x2="0" y2="22" stroke="#165090" stroke-width="8" stroke-linecap="round"/>
        <ellipse cx="0" cy="24" rx="6.5" ry="4.5" fill="#4D2E14"/>
      </g>
    </g>

    <!-- ── LEFT LEG — pivot at left hip (21, 45) ──
         Starts kicked up (−18°), plants (+15°) at halfway. -->
    <g transform="translate(21,45)">
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="-18 0 0;15 0 0;-18 0 0"
          keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <line x1="0" y1="0" x2="0" y2="22" stroke="#1A5FA0" stroke-width="8" stroke-linecap="round"/>
        <ellipse cx="0" cy="24" rx="6.5" ry="4.5" fill="#5D3A1A"/>
      </g>
    </g>

    <!-- ── RIGHT ARM — pivot at right shoulder (37, 24) ──
         Opposite phase to left arm.
         Starts braced low (+55°), swings up (−40°) at halfway. -->
    <g transform="translate(37,24)">
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="55 0 0;-40 0 0;55 0 0"
          keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <line x1="0" y1="0" x2="0" y2="-17" stroke="#3D8B3D" stroke-width="6" stroke-linecap="round"/>
        <circle cx="0" cy="-17" r="4.2" fill="#F5C49A"/>
      </g>
    </g>

    <!-- ── LEFT ARM — pivot at left shoulder (17, 24) ──
         Starts reaching high (−40°), swings down (+55°) at halfway. -->
    <g transform="translate(17,24)">
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="-40 0 0;55 0 0;-40 0 0"
          keyTimes="0;0.5;1" dur="0.8s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <line x1="0" y1="0" x2="0" y2="-17" stroke="#3D8B3D" stroke-width="6" stroke-linecap="round"/>
        <circle cx="0" cy="-17" r="4.2" fill="#F5C49A"/>
      </g>
    </g>

  </g>
</svg>
