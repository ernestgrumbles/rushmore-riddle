<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 82">

  <!-- Body bobs gently as weight shifts -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-2; 0,0; 0,1; 0,0"
      keyTimes="0;0.25;0.5;0.75;1"
      dur="1.1s" repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

    <!-- BACKPACK — on back (left side of right-facing figure) -->
    <rect x="7"  y="21" width="15" height="20" rx="3" fill="#CC3300"/>
    <rect x="8"  y="23" width="13" height="16" rx="2" fill="#E84020"/>
    <!-- Backpack strap -->
    <line x1="22" y1="24" x2="22" y2="38" stroke="#AA2200" stroke-width="1.8"/>

    <!-- ROPE COIL slung over left shoulder — mountaineer style -->
    <!-- Outer coil loop -->
    <ellipse cx="19" cy="30" rx="10" ry="7"
      fill="none" stroke="#E07828" stroke-width="4" stroke-linecap="round"/>
    <!-- Inner coil loop -->
    <ellipse cx="19" cy="30" rx="5.5" ry="3.5"
      fill="none" stroke="#C86018" stroke-width="3" stroke-linecap="round"/>
    <!-- Rope sling over shoulder to torso -->
    <path d="M19 23 Q26 19 33 22"
      stroke="#E07828" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Short rope tail hanging from coil -->
    <path d="M19 37 Q17 43 20 50"
      stroke="#E07828" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- TORSO — green jacket, body slightly wider on right (facing side) -->
    <path d="M24 22 Q26 20 40 20 Q53 20 55 22 L51 43 Q44 47 36 47 Q28 47 24 43 Z"
      fill="#3D8B3D"/>
    <!-- Collar/lapel detail -->
    <path d="M38 20 L34 27 L38 24.5 L42 27 Z" fill="#2D6B2D"/>

    <!-- RIGHT LEG — pivot at right hip (44, 46) — starts planted -->
    <g transform="translate(44,46)">
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="14 0 0;-18 0 0;14 0 0"
          keyTimes="0;0.5;1" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <line x1="0" y1="0" x2="0" y2="22"
          stroke="#165090" stroke-width="8" stroke-linecap="round"/>
        <ellipse cx="0" cy="24" rx="7" ry="4.5" fill="#4D2E14"/>
      </g>
    </g>

    <!-- LEFT LEG — pivot at left hip (28, 46) — opposite phase -->
    <g transform="translate(28,46)">
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="-18 0 0;14 0 0;-18 0 0"
          keyTimes="0;0.5;1" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <line x1="0" y1="0" x2="0" y2="22"
          stroke="#1A5FA0" stroke-width="8" stroke-linecap="round"/>
        <ellipse cx="0" cy="24" rx="7" ry="4.5" fill="#5D3A1A"/>
      </g>
    </g>

    <!-- RIGHT ARM — reaches forward-right toward rock face
         Pivot at right shoulder (51, 23).
         Hand sweeps from high-forward to low-forward (not side-to-side). -->
    <g transform="translate(51,23)">
      <line x1="0" y1="0" stroke="#3D8B3D" stroke-width="6" stroke-linecap="round">
        <animate attributeName="x2"
          values="12;7;12" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <animate attributeName="y2"
          values="-15;8;-15" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </line>
      <circle r="4.2" fill="#F5C49A">
        <animate attributeName="cx"
          values="12;7;12" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <animate attributeName="cy"
          values="-15;8;-15" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </circle>
    </g>

    <!-- LEFT ARM — same forward direction, opposite phase
         Pivot at left shoulder (33, 23). -->
    <g transform="translate(33,23)">
      <line x1="0" y1="0" stroke="#3D8B3D" stroke-width="6" stroke-linecap="round">
        <animate attributeName="x2"
          values="7;12;7" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <animate attributeName="y2"
          values="8;-15;8" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </line>
      <circle r="4.2" fill="#F5C49A">
        <animate attributeName="cx"
          values="7;12;7" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <animate attributeName="cy"
          values="8;-15;8" dur="1.1s" repeatCount="indefinite"
          calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </circle>
    </g>

    <!-- HAIR -->
    <ellipse cx="42" cy="8"  rx="13" ry="10" fill="#7B4A28"/>

    <!-- HEAD — profile facing right -->
    <ellipse cx="42" cy="10" rx="11"  ry="9.5" fill="#F5C49A"/>

    <!-- EAR (back of head, left side of sprite) -->
    <ellipse cx="32" cy="11" rx="2.5" ry="3"   fill="#F0BA8A"/>

    <!-- EYE (right side, looking forward/right) -->
    <circle cx="47" cy="9"   r="2.2"  fill="#222"/>
    <circle cx="47.9" cy="8.2" r="0.9" fill="white"/>

    <!-- DETERMINED BROW -->
    <path d="M44 6.5 Q47 5 50 6.5"
      stroke="#5A3010" stroke-width="1.6" fill="none" stroke-linecap="round"/>

    <!-- NOSE — profile bump -->
    <path d="M51 11 Q53 12.5 51 14"
      stroke="#D4A870" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- GRIN — facing right -->
    <path d="M47 14.5 Q50 18 54 14.5"
      stroke="#C06030" stroke-width="1.4" fill="#F8A8A8" stroke-linecap="round"/>

    <!-- NECK -->
    <rect x="38" y="18" width="8" height="5" rx="2" fill="#F5C49A"/>
  </g>
</svg>
