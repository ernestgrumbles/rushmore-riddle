<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 74">
  <!-- Hair -->
  <ellipse cx="25" cy="9" rx="12" ry="10" fill="#7B4A28"/>
  <!-- Head -->
  <ellipse cx="25" cy="11" rx="11" ry="9.5" fill="#F5C49A"/>
  <!-- Ear -->
  <ellipse cx="14.5" cy="12" rx="2.5" ry="3" fill="#F0BA8A"/>
  <!-- Eyes -->
  <circle cx="21.5" cy="10" r="2" fill="#222"/>
  <circle cx="28.5" cy="10" r="2" fill="#222"/>
  <circle cx="22.2" cy="9.2" r="0.8" fill="white"/>
  <circle cx="29.2" cy="9.2" r="0.8" fill="white"/>
  <!-- Eyebrows -->
  <path d="M19 7 Q21.5 5.5 24 7" stroke="#5A3010" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M27 7 Q29.5 5.5 32 7" stroke="#5A3010" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Big grin -->
  <path d="M19 15 Q25 20 31 15" stroke="#C06030" stroke-width="1.3" fill="#F8A8A8" stroke-linecap="round"/>
  <!-- Teeth hint -->
  <path d="M20.5 15.5 Q25 16.5 29.5 15.5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="21" y="20" width="8" height="5" rx="2" fill="#F5C49A"/>
  <!-- Green jacket/shirt body -->
  <path d="M12 25 Q14 22 25 22 Q36 22 38 25 L36 42 Q31 44 25 44 Q19 44 14 42 Z" fill="#3D8B3D"/>
  <!-- Jacket collar/lapels -->
  <path d="M25 22 L21 28 L25 26 L29 28 Z" fill="#2D6B2D"/>
  <!-- Backpack (red, sits behind right side) -->
  <rect x="33" y="22" width="12" height="18" rx="3" fill="#CC3300"/>
  <rect x="34" y="24" width="10" height="14" rx="2" fill="#E84020"/>
  <line x1="33" y1="26" x2="33" y2="38" stroke="#AA2200" stroke-width="1.5"/>
  <!-- Left arm raised UP (reaching to climb) -->
  <line x1="14" y1="26" x2="4" y2="14" stroke="#3D8B3D" stroke-width="5" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="3.5" cy="13" r="4" fill="#F5C49A"/>
  <!-- Right arm braced sideways -->
  <line x1="14" y1="30" x2="6" y2="36" stroke="#3D8B3D" stroke-width="5" stroke-linecap="round"/>
  <circle cx="5" cy="37" r="3.5" fill="#F5C49A"/>
  <!-- Pants (blue jeans) -->
  <rect x="14" y="43" width="9" height="23" rx="3" fill="#1A5FA0"/>
  <rect x="24" y="43" width="9" height="23" rx="3" fill="#1A5FA0"/>
  <!-- Knee highlight -->
  <ellipse cx="18" cy="55" rx="3.5" ry="2.5" fill="#2070B8" opacity="0.5"/>
  <ellipse cx="28" cy="55" rx="3.5" ry="2.5" fill="#2070B8" opacity="0.5"/>
  <!-- Boots -->
  <path d="M12 64 Q14 66 20 66 Q22 66 22 64 L22 63 L13 63 Z" fill="#5D3A1A"/>
  <path d="M22 64 Q24 66 32 66 Q34 66 34 64 L34 63 L23 63 Z" fill="#5D3A1A"/>
  <!-- Boot sole -->
  <rect x="11" y="65" width="12" height="2.5" rx="1" fill="#3D2010"/>
  <rect x="22" y="65" width="12" height="2.5" rx="1" fill="#3D2010"/>
</svg>
