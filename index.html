
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rushmore Riddle Climb</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div id="intro-screen">
    <img id="intro-bg" src="img/B8E60169-58A8-45DE-8269-8B4BAF1BB224.png" alt="Mt. Rushmore" />
    <button id="start-btn">Climb Rushmore!</button>
  </div>

  <div id="game-container" style="display:none;">
    <!-- Cartoon Rushmore background -->
    <img id="mountain-bg" src="img/B8E60169-58A8-45DE-8269-8B4BAF1BB224.png" alt="Mt. Rushmore" />

    <!-- Climber -->
    <div id="climber-area">
      <img id="climber" src="img/climber.png" alt="Climber" />
    </div>

    <!-- Top HUD: timer only, floating over sky -->
    <div id="hud">
      <span id="reaction-text"></span>
      <span id="timer">⏱ <span id="time-left">90</span>s</span>
    </div>

    <!-- Bottom trivia panel -->
    <div id="trivia-panel">
      <div id="question-box"></div>
      <div id="answers"></div>
    </div>

    <!-- End screen overlay (inside game-container) -->
    <div id="end-screen" style="display:none;">
      <p id="end-message"></p>
      <button id="restart-btn">Play Again</button>
    </div>
  </div>
</body>
</html>
